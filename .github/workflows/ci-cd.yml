name: Aegis CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './backend/package-lock.json'
        
    - name: Install dependencies
      run: |
        cd backend
        npm ci
        
    - name: Generate Prisma client
      run: |
        cd backend
        npx prisma generate
        
    - name: Build TypeScript code
      run: |
        cd backend
        npm run build

  ai-service-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: |
        cd ai-service
        pip install --upgrade pip
        # Remove version pins for CI environment setup
        sed -i 's/==.*//g' requirements.txt
        pip install -r requirements.txt
        
    - name: Lint with flake8
      run: |
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-test, ai-service-test]
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Backend Image
      run: docker build -t aegis-backend:latest ./backend
      
    - name: Build AI Service Image
      run: docker build -t aegis-ai-service:latest ./ai-service
